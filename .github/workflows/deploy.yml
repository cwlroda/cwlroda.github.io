name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Permissions required by actions/deploy-pages to publish via the Pages API.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment in flight at a time; cancel queued ones, but let the
# running deploy finish so we never publish a half-rolled-out site.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            snailstrail/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Cache snailstrail node_modules
        uses: actions/cache@v4
        with:
          path: snailstrail/node_modules
          key: snailstrail-node-modules-${{ runner.os }}-${{ hashFiles('snailstrail/package-lock.json') }}

      - name: Build
        # Main app builds with Vite, then chains into the Vite build for the
        # Snail's Trail game (snailstrail/ -> build/snailstrail/).
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
