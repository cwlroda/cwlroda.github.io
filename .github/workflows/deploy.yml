name: Deploy to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

# Permissions required by actions/deploy-pages to publish via the Pages API.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment in flight at a time; cancel queued ones, but let the
# running deploy finish so we never publish a half-rolled-out site.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        # CI=false so warnings don't fail the build — react-scripts 4 with
        # the legacy openssl provider needs the same flag the local script
        # passes.
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./build"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
