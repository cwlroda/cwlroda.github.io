<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Wei Loon Cheng</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // MIT License — Copyright (c) Rafael Pedicini
      //
      // Redirects deep-link requests that GitHub Pages 404s on
      // (e.g. /experience) back to index.html, encoding the original
      // path so the SPA can restore it once React Router boots.
      //
      // pathSegmentsToKeep = 0 for user/org sites served from the
      // domain root (cwlroda.github.io). Use 1 for project sites
      // hosted under a subpath (cwlroda.github.io/repo/).
      var pathSegmentsToKeep = 0;

      var l = window.location;

      // Snail's Trail is a separately-built sub-app served from
      // /snailstrail/. Don't funnel its 404s through the main SPA
      // — send the user to the game's entry instead.
      if (l.pathname.indexOf("/snailstrail/") === 0) {
        l.replace(
          l.protocol +
            "//" +
            l.hostname +
            (l.port ? ":" + l.port : "") +
            "/snailstrail/"
        );
      } else {
        l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      }
    </script>
  </head>
  <body></body>
</html>
