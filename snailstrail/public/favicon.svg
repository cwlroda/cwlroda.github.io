<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#f0f4e8" stroke="#2d5016" stroke-width="2"/>

  <!-- Spiral shell -->
  <path d="M 45 35 Q 45 25 55 25 Q 65 25 65 35 Q 65 45 55 45 Q 50 45 50 40"
        fill="none" stroke="#c0956d" stroke-width="3" stroke-linecap="round"/>
  <path d="M 45 40 Q 45 32 53 32 Q 60 32 60 38 Q 60 42 53 42 Q 50 42 50 39"
        fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round"/>

  <!-- Snail body -->
  <ellipse cx="45" cy="55" rx="12" ry="15" fill="#8b9d6f"/>

  <!-- Snail head -->
  <circle cx="45" cy="68" r="8" fill="#8b9d6f"/>

  <!-- Eyes (small circles on stalks) -->
  <line x1="42" y1="68" x2="40" y2="62" stroke="#2d5016" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="40" cy="61" r="1.5" fill="#2d5016"/>

  <line x1="48" y1="68" x2="50" y2="62" stroke="#2d5016" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="50" cy="61" r="1.5" fill="#2d5016"/>

  <!-- Mouth -->
  <path d="M 44 71 Q 45 72 46 71" stroke="#2d5016" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Trail/slime behind snail -->
  <ellipse cx="35" cy="72" rx="4" ry="3" fill="#d4e8c1" opacity="0.7"/>
  <ellipse cx="28" cy="71" rx="3" ry="2.5" fill="#d4e8c1" opacity="0.5"/>
</svg>